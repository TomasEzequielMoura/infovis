<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomas Moura | Visualización de la Información</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    object {
      width: 100%;
      height: auto;
      min-height: 400px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased p-6 md:p-12">

  <main class="max-w-5xl mx-auto space-y-12">

    <header class="text-center space-y-3 pb-6 border-b border-slate-200">
      <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">
        Visualización de la Información
      </h1>
      <p class="text-lg text-slate-500 font-medium">ITBA | Tomas Moura</p>
    </header>

    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="bg-slate-100 px-6 py-4 border-b border-slate-200">
        <h2 class="text-xl font-bold text-slate-800">Raw Graph</h2>
      </div>
      
      <div class="p-6 grid grid-cols-1 gap-8">
        <div class="bg-slate-50 rounded-xl p-2 border border-slate-100 flex items-center justify-center transition-all hover:shadow-md">
          <object type="image/svg+xml" data="./viz.svg"></object>
        </div>
        <div class="bg-slate-50 rounded-xl p-2 border border-slate-100 flex items-center justify-center transition-all hover:shadow-md">
          <object type="image/svg+xml" data="./Medals.svg"></object>
        </div>
      </div>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="bg-slate-100 px-6 py-4 border-b border-slate-200">
        <h2 class="text-xl font-bold text-slate-800">Flourish</h2>
      </div>
      
      <div class="p-6">
        <div class="flourish-embed flourish-chart rounded-xl overflow-hidden" data-src="visualisation/27939062">
          <script src="https://public.flourish.studio/resources/embed.js"></script>
          <noscript><img src="https://public.flourish.studio/visualisation/27939062/thumbnail" width="100%" alt="visualization" /></noscript>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
